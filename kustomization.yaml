apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Workload no modelo edit-friendly: components do app-base (golden path),
# env em arquivo plano, ganchos de capability ligam sozinhos (envFrom
# optional no app-base). Editado SÓ por Backstage e CI de promoção.
components:
  - https://github.com/TourinhoM/platform-app-base//components/workload?ref=main
  - https://github.com/TourinhoM/platform-app-base//components/metrics?ref=main
  - https://github.com/TourinhoM/platform-app-base//components/size-small?ref=main
  - https://github.com/TourinhoM/platform-app-base//components/http?ref=main

resources:
  - claims/appnamespace.yaml

labels:
  - pairs:
      backstage.io/kubernetes-id: exp-xr
    includeSelectors: false
    includeTemplates: true

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: app-config
    literals:
      - name=exp-xr
      - hostname=exp-xr.local
  - name: app-env
    envs:
      - env.properties

images:
  - name: app-image
    newName: ghcr.io/tourinho-labs/exp-xr
    newTag: "1.0.1"
